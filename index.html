<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Visitor Log System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="card">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/c/c2/New_Era_University_logo.png/220px-New_Era_University_logo.png" style="width:80px;">
            <h2>NEU Library System</h2>
            <button id="login-btn" class="btn-google">Login with Google</button>
        </div>

        <div id="user-section" class="card" style="display: none;">
            <h2 id="greeting">Welcome!</h2>
            
            <div id="admin-view" style="display: none;">
                <h3>Recent Visitor Logs</h3>
                <table id="logs-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        </tbody>
                </table>
            </div>

            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
