<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Visitor Log System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #004a99; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #004a99; color: white; border: none; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #003366; }
        .log-display { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #004a99; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>NEU Visitor Log</h2>
    
    <label>Full Name:</label>
    <input type="text" id="vName" placeholder="Juan Dela Cruz">
    
    <label>ID Number:</label>
    <input type="text" id="vID" placeholder="2023-12345">
    
    <label>Purpose of Visit:</label>
    <select id="vPurpose">
        <option value="Library Access">Library Access</option>
        <option value="Inquiry">General Inquiry</option>
        <option value="Registrar">Registrar</option>
        <option value="Event">School Event</option>
    </select>
    
    <button onclick="saveLog()">Submit Entry</button>

    <div class="log-display">
        <h3>Recent Logs</h3>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Purpose</th>
                    <th>Time In</th>
                </tr>
            </thead>
            <tbody id="logTable">
            </tbody>
        </table>
    </div>
</div>

<script>
    function saveLog() {
        const name = document.getElementById('vName').value;
        const id = document.getElementById('vID').value;
        const purpose = document.getElementById('vPurpose').value;
        const time = new Date().toLocaleTimeString();

        if(name === "" || id === "") {
            alert("Pakilagay po ang pangalan at ID number.");
            return;
        }

        const table = document.getElementById('logTable');
        const row = table.insertRow(0);
        row.innerHTML = `<td>${name}</td><td>${purpose}</td><td>${time}</td>`;

        // Clear fields
        document.getElementById('vName').value = "";
        document.getElementById('vID').value = "";
    }
</script>

</body>
</html>
