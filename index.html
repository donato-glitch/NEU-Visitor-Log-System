<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Visitor Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <div id="auth-section">
            <h1>New Era University</h1>
            <p>Library Visitor Log System</p>
            <button id="login-btn" class="btn-google">
                <img src="https://www.google.com/favicon.ico" width="18"> Login with Google
            </button>
        </div>

        <div id="user-section" style="display: none;">
            <h2 id="greeting">Welcome to NEU Library!</h2>

            <div id="admin-controls" class="admin-controls" style="display: none;">
                <span class="label">ADMIN PANEL</span>
                <div class="role-btns">
                    <button id="user-view-btn" onclick="toggleRole('user')" class="active">Kiosk View</button>
                    <button id="admin-view-btn" onclick="toggleRole('admin')">Dashboard</button>
                </div>
            </div>

            <div id="visitor-form-container">
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Please select your details:</p>
                <select id="user-type">
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Staff">Staff</option>
                </select>
                <select id="college">
                    <option value="CICS">CICS (Computing Studies)</option>
                    <option value="CAS">CAS (Arts and Sciences)</option>
                    <option value="COE">COE (Engineering)</option>
                    <option value="CBA">CBA (Business Admin)</option>
                </select>
                <select id="reason">
                    <option value="Research">Research</option>
                    <option value="Study">Self Study</option>
                    <option value="Borrow">Borrow Books</option>
                    <option value="Return">Return Books</option>
                </select>
                <button onclick="submitLog()" class="btn-submit">Submit Visitor Log</button>
            </div>

            <div id="admin-view" style="display: none;">
                <div class="chart-section">
                    <p style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">Total Library Logs</p>
                    <div class="circle-container">
                        <b id="total-circle">0</b>
                        <small>Visitors</small>
                    </div>
                    <div class="filter-row" style="margin-top: 15px;">
                         <input type="date" id="filter-date" onchange="updateStats()">
                         <select id="filter-reason" onchange="updateStats()">
                            <option value="All">All Reasons</option>
                            <option value="Research">Research</option>
                            <option value="Study">Study</option>
                            <option value="Borrow">Borrow</option>
                        </select>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="stat-card">
                        <h4>🍔 Menu</h4>
                        <button class="quick-btn">📖 Books</button>
                        <button class="quick-btn">👥 Members</button>
                    </div>
                    <div class="stat-card">
                        <h4>⚡ Quick Actions</h4>
                        <button class="quick-btn" style="color: #28a745;">+ Add Log</button>
                        <button class="quick-btn" style="color: #007bff;">+ Export Data</button>
                    </div>
                </div>
                
                <div class="stat-item" style="margin-top: 15px; background: #0047ab; color: white; padding: 10px; border-radius: 8px;">
                    <small>Filtered Result: </small> <b id="filtered-stat">0</b>
                </div>
            </div>

            <button onclick="logout()" class="signout-btn">Sign Out Account</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
