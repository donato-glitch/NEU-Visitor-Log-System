<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to NEU Library</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="auth-section">
    <div class="split-container">
        <div class="login-side student-side">
            <i class="fas fa-user-graduate fa-5x"></i>
            <h2>Student & Staff</h2>
            <p>Library Visitor Kiosk</p>
            <button class="google-btn" onclick="login()">
                <img src="https://www.google.com/favicon.ico"> Continue with Google
            </button>
        </div>
        <div class="login-side admin-side">
            <i class="fas fa-user-shield fa-5x"></i>
            <h2>Administrator</h2>
            <p>Library Management System</p>
            <button class="google-btn admin-g-btn" onclick="login()">
                <img src="https://www.google.com/favicon.ico"> Login as Admin
            </button>
        </div>
    </div>
</div>
<div id="main-app" style="display: none;">
    <div class="metro-wrapper">
        <header class="metro-header">
            <div class="header-left">
                <h1>Welcome to NEU Library</h1>
                <span>Midterm Project | Version 2.0.0</span>
            </div>
            <div class="header-right">
                <button id="role-switch-btn" onclick="toggleRole()" class="switch-role-btn" style="display:none;">
                    <i class="fas fa-exchange-alt"></i> Switch Role
                </button>
                <i class="fas fa-university fa-2x"></i>
            </div>
        </header>
        <div id="admin-view" class="view-container" style="display: none;">
            <div class="admin-controls">
                <div class="filter-box"><label>Range:</label><select id="date-range" onchange="loadAdminLogs()"><option value="today">Today</option><option value="week">This Week</option><option value="all">All Records</option></select></div>
                <div class="filter-box"><label>Type:</label><select id="visitor-type" onchange="loadAdminLogs()"><option value="all">All Visitors</option><option value="Student">Students Only</option><option value="Employee">Employees Only</option></select></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card blue"><h3 id="stat-total">0</h3><p>Total Visitors</p></div>
                <div class="stat-card teal"><h3 id="stat-students">0</h3><p>Students</p></div>
                <div class="stat-card purple"><h3 id="stat-employees">0</h3><p>Teachers/Staff</p></div>
            </div>
            <div class="tile-grid">
                <div class="tile bg-blue" onclick="showView('kiosk')"><i class="fas fa-pen"></i><span>Open Kiosk</span></div>
                <div class="tile bg-red" onclick="logout()"><i class="fas fa-power-off"></i><span>Logout</span></div>
            </div>
            <div class="metro-table-card">
                <table>
                    <thead><tr><th>Name</th><th>Type</th><th>College</th><th>Reason</th><th>Date</th></tr></thead>
                    <tbody id="admin-log-data"></tbody>
                </table>
            </div>
        </div>
        <div id="kiosk-view" class="view-container" style="display: none;">
            <div class="form-card">
                <h2>Visitor Entry Form</h2>
                <div class="form-group"><label>I am a/an:</label><select id="user_type"><option value="Student">Student</option><option value="Employee">Employee (Teacher/Staff)</option></select></div>
                <div class="form-group"><label>College/Department</label><select id="college"><option value="CICS">CICS</option><option value="CAS">CAS</option><option value="COE">COE</option><option value="CON">CON</option><option value="STAFF">University Office</option></select></div>
                <div class="form-group"><label>Reason for Visit</label><select id="reason"><option value="Self Study">Self Study</option><option value="Research">Research</option><option value="Borrow/Return">Borrow/Return</option></select></div>
                <button onclick="submitLog()" class="submit-btn">SUBMIT ENTRY</button>
                <div class="form-footer-btns">
                    <button onclick="clearForm()" class="btn-clear">Clear</button>
                    <button id="back-to-admin-btn" onclick="showView('admin')" class="btn-back" style="display:none;">Back</button>
                    <button id="kiosk-logout-btn" onclick="logout()" class="btn-logout">Logout</button>
                </div>
            </div>
        </div>
        <footer class="metro-footer"><span id="user-status">...</span><span id="clock">00:00:00</span></footer>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
