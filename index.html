<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-section" class="overlay">
    <div class="login-card">
        <h1>New Era University</h1>
        <p>Library Visitor Log System</p>
        <button id="login-btn" class="btn-google">
            <img src="https://www.google.com/favicon.ico" width="18"> Login with NEU Google Account
        </button>
    </div>
</div>

<div id="user-section" style="display: none;" class="dashboard-container">
    
    <header class="top-bar">
        <h2 id="greeting">Welcome to NEU Library!</h2>
        <div id="admin-controls" style="display: none;" class="role-switcher">
            <button id="user-view-btn" onclick="toggleRole('user')" class="active">Kiosk Mode</button>
            <button id="admin-view-btn" onclick="toggleRole('admin')">Admin Dashboard</button>
        </div>
        <button onclick="logout()" class="btn-logout">Sign Out</button>
    </header>

    <main class="content">
        <div id="visitor-form-container" class="center-content">
            <div class="form-card">
                <h3>Visitor Entry Form</h3>
                <select id="user-type">
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher (Employee)</option>
                    <option value="Staff">Staff (Employee)</option>
                </select>
                <select id="college">
                    <option value="CICS">CICS (Computing Studies)</option>
                    <option value="CAS">CAS (Arts and Sciences)</option>
                    <option value="COE">COE (Engineering)</option>
                    <option value="CBA">CBA (Business Admin)</option>
                </select>
                <select id="reason">
                    <option value="Research">Research</option>
                    <option value="Study">Self Study</option>
                    <option value="Borrow">Borrow Books</option>
                </select>
                <button onclick="submitLog()" class="btn-submit">Submit Entry</button>
            </div>
        </div>

        <div id="admin-view" style="display: none;" class="admin-grid">
            <div class="side-panel">
                <div class="dash-card chart-section">
                    <h4>Total Borrowers/Visitors</h4>
                    <div class="circle-chart">
                        <span id="total-circle">0</span>
                    </div>
                </div>
                <div class="dash-card">
                    <h4>🍔 Menu</h4>
                    <button class="menu-item">Books</button>
                    <button class="menu-item">Members</button>
                </div>
                <div class="dash-card">
                    <h4>⚡ Quick Buttons</h4>
                    <button class="action-btn">+ Add Book</button>
                    <button class="action-btn">+ Add Member</button>
                </div>
            </div>

            <div class="main-panel">
                <div class="dash-card filter-bar">
                    <input type="date" id="filter-date" onchange="updateStats()">
                    <select id="filter-college" onchange="updateStats()">
                        <option value="All">All Colleges</option>
                        <option value="CICS">CICS</option>
                        <option value="CAS">CAS</option>
                    </select>
                </div>
                <div class="dash-card table-container">
                    <h4>Visitor Log History</h4>
                    <table id="log-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>College</th>
                                <th>Reason</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="log-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
